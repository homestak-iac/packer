name: Copy Images

on:
  workflow_dispatch:
    inputs:
      source_release:
        description: 'Source release tag (e.g., v0.17)'
        required: true
        type: string
      target_release:
        description: 'Target release tag (e.g., v0.18)'
        required: true
        type: string
      notes:
        description: 'Release notes for target (optional, for copied images)'
        required: false
        type: string
        default: ''
      sync_latest:
        description: 'Also sync assets to latest release'
        required: false
        type: boolean
        default: true

jobs:
  copy-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate inputs
        run: |
          if [[ ! "${{ inputs.source_release }}" =~ ^v[0-9]+\.[0-9]+ ]]; then
            echo "Error: Invalid source release format. Expected vX.Y (e.g., v0.17)"
            exit 1
          fi
          # Target can be 'latest' or vX.Y format
          if [[ "${{ inputs.target_release }}" != "latest" ]] && [[ ! "${{ inputs.target_release }}" =~ ^v[0-9]+\.[0-9]+ ]]; then
            echo "Error: Invalid target release format. Expected 'latest' or vX.Y (e.g., v0.18)"
            exit 1
          fi

      - name: Check source release exists and has images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ inputs.source_release }}" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "Error: Source release ${{ inputs.source_release }} not found"
            exit 1
          fi

          # Check source has image assets (not just SHA256SUMS)
          ASSET_COUNT=$(gh release view "${{ inputs.source_release }}" --repo ${{ github.repository }} --json assets --jq '[.assets[] | select(.name | endswith(".img") or endswith(".qcow2"))] | length')
          if [[ "$ASSET_COUNT" -eq 0 ]]; then
            echo "Error: Source release ${{ inputs.source_release }} has no image assets"
            echo "Available assets:"
            gh release view "${{ inputs.source_release }}" --repo ${{ github.repository }} --json assets --jq '.assets[].name'
            exit 1
          fi
          echo "Found $ASSET_COUNT image(s) in source release"

      - name: Ensure target release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET="${{ inputs.target_release }}"

          if gh release view "$TARGET" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "Target release $TARGET exists"
          elif [[ "$TARGET" == "latest" ]]; then
            # Create 'latest' release if it doesn't exist
            echo "Creating 'latest' release..."
            SOURCE_SHA=$(gh api repos/${{ github.repository }}/git/refs/tags/${{ inputs.source_release }} --jq '.object.sha' 2>/dev/null || echo "")
            if [[ -z "$SOURCE_SHA" ]]; then
              echo "Error: Could not get SHA for source release"
              exit 1
            fi
            gh release create latest --repo ${{ github.repository }} \
              --title "Latest Release" \
              --notes "Points to latest stable images" \
              --target "$SOURCE_SHA"
            echo "Created 'latest' release"
          else
            echo "Error: Target release $TARGET not found"
            echo "Create the release first with: gh release create $TARGET"
            exit 1
          fi

      - name: List source assets
        id: list-assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Assets in ${{ inputs.source_release }}:"
          gh release view "${{ inputs.source_release }}" --repo ${{ github.repository }} --json assets --jq '.assets[].name'

      - name: Download assets from source release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ inputs.source_release }}" \
            --repo ${{ github.repository }} \
            --dir assets
          ls -la assets/

      - name: Upload assets to target release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in assets/*; do
            if [[ -f "$file" ]]; then
              echo "Uploading: $(basename "$file")"
              gh release upload "${{ inputs.target_release }}" \
                "$file" \
                --repo ${{ github.repository }} \
                --clobber
            fi
          done

      - name: Update target release notes
        if: inputs.notes != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Updating release notes for ${{ inputs.target_release }}..."
          gh release edit "${{ inputs.target_release }}" \
            --repo ${{ github.repository }} \
            --notes "${{ inputs.notes }}"
          echo "✓ Release notes updated"

      - name: Verify target upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Assets in ${{ inputs.target_release }}:"
          gh release view "${{ inputs.target_release }}" --repo ${{ github.repository }} --json assets --jq '.assets[].name'

      - name: Sync assets to latest release
        if: inputs.target_release != 'latest' && inputs.sync_latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Syncing assets to 'latest' release..."

          # Ensure latest release exists
          if ! gh release view latest --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "Creating 'latest' release..."
            TARGET_SHA=$(gh api repos/${{ github.repository }}/git/refs/tags/${{ inputs.target_release }} --jq '.object.sha' 2>/dev/null || echo "")
            if [[ -z "$TARGET_SHA" ]]; then
              echo "Warning: Could not get SHA for ${{ inputs.target_release }}, skipping latest sync"
              exit 0
            fi
            gh release create latest --repo ${{ github.repository }} \
              --title "Latest Release" \
              --notes "Points to ${{ inputs.target_release }}" \
              --target "$TARGET_SHA"
          fi

          # Upload assets to latest (reuse already downloaded assets)
          for file in assets/*; do
            if [[ -f "$file" ]]; then
              echo "Uploading to latest: $(basename "$file")"
              gh release upload latest \
                "$file" \
                --repo ${{ github.repository }} \
                --clobber
            fi
          done

          # Update latest release notes
          gh release edit latest \
            --repo ${{ github.repository }} \
            --notes "Points to ${{ inputs.target_release }}"

          echo "✓ Assets synced to 'latest' release"

      - name: Update latest tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET="${{ inputs.target_release }}"
          SOURCE="${{ inputs.source_release }}"

          # When target is 'latest', point tag to source release commit
          # When target is versioned, point tag to target release commit
          if [[ "$TARGET" == "latest" ]]; then
            REF_TAG="$SOURCE"
            echo "Updating 'latest' tag to point to $SOURCE (source release)..."
          else
            REF_TAG="$TARGET"
            echo "Updating 'latest' tag to point to $TARGET..."
          fi

          # Get the commit SHA for the reference tag
          TARGET_SHA=$(gh api repos/${{ github.repository }}/git/refs/tags/$REF_TAG --jq '.object.sha' 2>/dev/null || echo "")

          if [[ -z "$TARGET_SHA" ]]; then
            echo "Warning: Could not get SHA for $REF_TAG, skipping latest tag update"
            exit 0
          fi

          echo "Reference SHA: $TARGET_SHA"

          # Check if latest tag exists
          if gh api repos/${{ github.repository }}/git/refs/tags/latest >/dev/null 2>&1; then
            # Update existing tag (use -F for boolean type)
            echo "Updating existing 'latest' tag..."
            gh api -X PATCH repos/${{ github.repository }}/git/refs/tags/latest \
              -f sha="$TARGET_SHA" \
              -F force=true
            echo "Updated 'latest' tag to $TARGET_SHA"
          else
            # Create new tag
            echo "Creating 'latest' tag..."
            gh api -X POST repos/${{ github.repository }}/git/refs \
              -f ref="refs/tags/latest" \
              -f sha="$TARGET_SHA"
            echo "Created 'latest' tag pointing to $TARGET_SHA"
          fi

          echo "✓ 'latest' tag now points to $REF_TAG ($TARGET_SHA)"
