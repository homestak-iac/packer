name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run bats tests
        run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run shellcheck
        run: |
          shellcheck build.sh publish.sh checksums.sh

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: 1.11.0

      - name: Create dummy SSH key for validation
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -q

      - name: Validate templates
        run: |
          SSH_PUBLIC_KEY=$(cat ~/.ssh/id_ed25519.pub)
          for template in templates/*/template.pkr.hcl; do
            echo "=== Validating $template ==="
            packer init "$template"
            packer fmt -check "$template"
            packer validate \
              -var "ssh_public_key=$SSH_PUBLIC_KEY" \
              -var "ssh_private_key_file=$HOME/.ssh/id_ed25519" \
              "$template"
          done
